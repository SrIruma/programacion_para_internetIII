<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio 4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">
    <h2 class="text-center mb-4">Laboratorio 4 - Registro de Equipos</h2>
    
    <div class="row">
        <!-- Formulario -->
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-body">
                    <form id="formEquipo">
                        <div class="mb-3">
                            <label class="form-label">Codigo del Equipo</label>
                            <input type="text" id="codigo" class="form-control" placeholder="Ej: E001">
                            <small class="text-danger" id="errorCodigo"></small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Nombre del Dispositivo</label>
                            <input type="text" id="nombre" class="form-control">
                            <small class="text-danger" id="errorNombre"></small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Categorias</label>

                            <select id="categoria" class="form-select">

                                <option value="">Seleccione una Categoria</option>
                                <option>Servidores</option>
                                <option>Redes</option>
                                <option>Laptops</option>
                            </select>
                            <small class="text-danger" id="errorCategoria"></small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Precio Unitario</label>
                            <input type="number" id="precio" class="form-control">
                            <small class="text-danger" id="errorPrecio"></small>
                        </div>

                        <button class="btn btn-success w-100" type="submit">Registrar Equipo</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Tabla -->
        <div class="col-md-7">
            <div class="card shadow">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h4>Equipos Registrados</h4>
                    <span class="badge bg-primary fs-6" id="contador">
                        0
                    </span>
                </div>
                
                <div class="card-body">
                    <table class="table table-bordered table-striped">
                        <thead class="table-dark">
                            <tr>
                                <th>Codigo</th>                                    
                                <th>Nombre</th>                                    
                                <th>Categoria</th>
                                <th>Precio</th>
                            </tr>
                        </thead>
                        
                        <tbody id="tablaEquipos"></tbody>
                    </table>
                    <button class="btn btn-danger btn-sm" id="limpiarTabla">Limpiar Tabla</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
