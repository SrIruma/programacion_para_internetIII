<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTROS DE EQUIPOS</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="style.css">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="row">

            <div class="col-md-5"> <!--col-md-5 ALINEA A LA DERECHA-->

                <div class="card shadow">

                    <div class="card-header bg-success text-white">
                        <h4><strong>REGISTRO DE EQUIPOS</strong></h4>
                    </div>

                    <div class="card-body"> <!--AQUI COMIENZA EL FORMULARIO-->
                        <form id="formEquipo">
                            <div class="mb-3">
                                <label for="" class="form-label">CÓDIGO DEL EMPLEADO: </label>
                                <input type="text" id="CODIGO" class="form-control" placeholder="EJ: E01">
                                <small id="errorCODIGO" class="text-danger"></small>
                            </div><!--AQUI TERMINA PARA INGRESAR EL CODIGO DE EMPLEADO-->

                            <div class="mb-3">
                                <label for="" class="form-label">NOMBRE DEL DISPOSITIVO: </label>
                                <input type="text" id="NOMBRE" class="form-control">
                                <small id="errorNOMBRE" class="text-danger"></small>
                            </div><!--AQUI TERMINA PARA INGRESAR EL NOMBRE DEL DISPOSITIVO-->

                            <div class="mb-3">
                                <label class="form-label">CATEGORÍA: </label>
                                <select id="CATEGORIA" class="form-select">
                                    <option value="">SELECCIONE....</option>
                                    <option>SERVIDORES</option>
                                    <option>REDES</option>
                                    <option>LAPTOPS</option>
                                    
                                </select>
                                <small id="errorCATEGORIA" class="text-danger"></small>
                            </div><!--AQUI TERMINA LA CATEGORIA-->

                            <div class="mb-3">
                                <label class="form-label">PRECIO UNITARIO: </label>
                                <input type="number" id="PRECIO" class="form-control">
                                <small id="errorPRECIO" class="text-danger"></small>
                            </div><!--AQUI TERMINA EL PRECIO UNITARIO-->

                            <button class="btn btn-success w-100">REGISTRAR EQUIPOS</button>

                        </form>
                    </div>

                </div>
            </div>

            <!--CREAREMOS LA TABLA DE AQUI EN ADELANTE-->
            <div class="col-md-7"> <!--col-md-7 ALINEA A LA IZQUIERDA-->
                <div class="card shadow">
                    <div class="card-header d-flex justify-content-between">
                        <h4><strong>EQUIPOS REGISTRADOS</strong></h4>

                        <span class="badge bg-primary fs-6" id="CONTADOR">
                            0
                        </span><!--AQUI TERMINA EL CONTADOR-->
                    </div>

                    <div class="card-body">
                        <!--AHORA COMENZAREMOS CON LA ESTRUCTURA DE LA TABLA-->
                        <table class="table table-bordered table-striped">
                            <thead class="table-success">
                                <tr>
                                    <th><strong>CÓDIGO</strong></th>
                                    <th><strong>NOMBRE DEL DISPOSITIVO</strong></th>
                                    <th><strong>CATEGORÍA</strong></th>
                                    <th><strong>PRECIO</strong></th>
                                </tr>
                            </thead>

                            <tbody id="tablaEquipos">

                            </tbody>

                        </table>

                        <button id="limpiarTABLA" class="btn btn-danger">LIMPIAR TABLA</button>

                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
    
</body>
</html>
