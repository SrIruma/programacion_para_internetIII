<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <title>Creación de Equipos</title>
</head>
<body class="bg-light">
    <div class="container mt-4">
        <div class="row">

            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-header">
                        <h4 mb-0>Formulario de Registro de Equipos</h4>
                    </div>
            
                <div class="card-body">
                    <form id="formRegistrar">
                        <div class="mb-3">
                            <label class="form-label"><strong>Código:</strong></label>
                            <input class="form-control"  type="text" id="codigo" placeholder="Ej: E001">
                            <small id="errorCodigo" class="text-danger"></small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label"><strong>Nombre del Dispositivo:</strong></label>
                            <input class="form-control" type="text" placeholder="Ej: Computadoras" id="nombreDispositivo">
                            <small id="errorDispositivo" class="text-danger"></small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Categoría:</label>
                            <select class="form-select" id="categoria">
                                <option>Servidores</option>
                                <option>Redes</option>
                                <option>Laptops</option>
                                <option>Refrigeradoras</option>
                            </select>
                            <small id="errorCategoria" class="text-danger"></small>
                            
                        </div>

                        <div class="mb-3">
                            <label class="form-label"><strong>Precio Unitario:</strong></label>
                            <input class="form-control" type="number" id="precio">
                            <small id="errorPrecio" class="text-danger"></small>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Registrar Equipo</button>
                    </form>
                </div>
            </div>
        </div>
    
        



        <div class="col-md-7">
            <div class="card-body">
                <div class="card-header d-flex justify-content-between"> 
                    <h4> Equipos Registrados</h4>
                    <span class="badge bg-primary fs-6" id="contador">Total</span>
                </div>
                <div class="card-body">
                    <table class="table table-bordered table stripped">
                        <thead class="table-dark">
                            <tr>
                                <th>Código</th>
                                <th>Nombre del Dispositivo</th>
                                <th>Categoría</th>
                                <th>Precio Unitario</th>
                            </tr>

                        </thead>
                        <tbody id="tabla">

                        </tbody>
                    </table>
                    <button id="limpiarTabla" class="btn btn-danger">Vaciar Tabla</button>
                </div>
            </div>
        </div>
    </div>
</div>



    <script> 
        const formulario = document.getElementById("formRegistrar");
        const codigo = document.getElementById("codigo");
        const nombreDispositivo = document.getElementById("nombreDispositivo");
        const categoria = document.getElementById("categoria");
        const precio = document.getElementById("precio");
        
        const errorCodigo = document.getElementById("errorCodigo");
        const errorDispositvo = document.getElementById("errorDispositivo");
        const errorCategoria = document.getElementById("errorCategoria");
        const errorPrecio = document.getElementById("errorPrecio");


        //tabla
        const tabla = document.getElementById("tabla");
        const contador = document.getElementById("contador");
        const limpiar = document.getElementById("limpiarTabla");

        let total = 0;

        function limpiarErrores(){
            errorCodigo.textContent = "";
            errorDispositvo.textContent = "";
            errorCategoria.textContent= "";
            errorPrecio.textContent = "";
        }


        formulario.addEventListener("submit", function(e){
            e.preventDefault();
            limpiarErrores();

            let valido = true;
            let regex = /^E\d+$/;

            if (!regex.test(codigo.value.trim())){
                errorCodigo.textContent = "El código debe inicia con E seguido de números: Ej: E001";
                valido = false;

            }

            if (nombreDispositivo.value.trim().length<5){
                errorDispositvo.textContent = "El nombre debe tener mínimos 5 caracteres";
                valido = false;
            }

            if(categoria.value === ""){
                errorCategoria.textContent = "Seleccionar una categoria válida";
                valido = false;
            }
            if(Number(precio.value)<=0){
                errorPrecio.textContent= "El precio debe ser mayor a cero";
                valido = false;

            }

            if(!valido){
                return;
            }
            const fila = document.createElement("tr");
            fila.innerHTML= `
                <td>${codigo.value}</td>
                <td>${nombreDispositivo.value}</td>
                <td>${categoria.value}</td>
                <td>L. ${Number(precio.value).toFixed(2)}</td>`;
            
            tabla.appendChild(fila);
            total++;
            contador.textContent = total;
            formulario.reset();
        });

        limpiar.addEventListener("click", function(e){

            if (confirm("Desear eliminar los elementos de la tabla")){
                tabla.innerHTML = "";
                total=0;
                contador.textContent = 0;
            }
        });
    </script>

    
</body>
</html>
