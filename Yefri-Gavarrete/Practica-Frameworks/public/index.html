<!DOCTYPE html>
<html ng-app="app">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
    <title>Tareas</title>
</head>
<body ng-controller="TareaCtrl">
    <h1>Lista de Tareas</h1>
    <input type="text" ng-model="titulo" placeholder="Nueva tarea">
    <button ng-click="agregar()">Agregar</button>

    <ul>
        <li ng-repeat="tarea in tareas">{{ tarea.titulo }}
            <button ng-click="eliminar(tarea.id)">Eliminar</button>
        </li>
    </ul>

    <script>
        angular.module('app', [])
         .controller('TareaCtrl', function($scope, $http) {
            $scope.tareas = [];  

            $scope.cargar = function(){
                $http.get('/api/tareas').then(function(respuesta){
                    $scope.tareas = respuesta.data;
                });
            };
            $scope.agregar = function(){
                $http.post('/api/tareas',{titulo: $scope.titulo}).then(function(respuesta){
                    $scope.titulo = '';
                    $scope.cargar();
                });
            };
            $scope.eliminar = function(id){
                $http.delete('/api/tareas/' + id).then(function(){
                    $scope.cargar();
                });
            };
            $scope.cargar();

         });
    </script>

    
</body>
</html>
