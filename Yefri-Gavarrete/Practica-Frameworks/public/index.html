<!DOCTYPE html>
<html ng-app="app">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <title>Tareas</title>
</head>
<body ng-controller="TareaCtrl">


    <div class="row">
        <div class="col-md-4 input-icon-group">
            <h1 class="text-center mb-3">Lista de Tareas</h1>
                <div class="mb-3">
                    <input type="text" class="form-control" ng-model="titulo" placeholder="Nueva tarea">
                    <br>
                    <button class="btn btn-outline-primary w-100" ng-click="agregar()">Agregar</button>
               </div>
               <div class="mb-3">
                    <ul>
                        <li class="py-2" ng-repeat="tarea in tareas">
                            {{ tarea.titulo }}
                            <button class="btn btn-outline-danger w-30" ng-click="eliminar(tarea.id)">Eliminar</button>
                        </li>
                    </ul>
                </div>
        </div>
    </div>
    

    <script>
        angular.module('app', [])
         .controller('TareaCtrl', function($scope, $http) {
            
            $scope.tareas = [];  

            $scope.cargar = function(){
                $http.get('/api/tareas').then(function(respuesta){
                    $scope.tareas = respuesta.data;
                });
            };
            $scope.agregar = function(){
                $http.post('/api/tareas',{titulo: $scope.titulo}).then(function(respuesta){
                    $scope.titulo = '';
                    $scope.cargar();
                });
            };
            $scope.eliminar = function(id){
                $http.delete('/api/tareas/' + id).then(function(){
                    $scope.cargar();
                });
            };
            $scope.cargar();

         });
    </script>

    
</body>
</html>
