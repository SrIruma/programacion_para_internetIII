<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de equipo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">
    <div class="container">

        <section class="contenedor">
            <section class="izquierda">

                <div class="row">
                    <div class="col-md-7">
                        <div class="card shadow">
                            <h4>Registro de Equipos</h4>
                        </div>
                        <div class="card-body">
                            <form id="formEquipo">
                                <div class="mb-3">
                                    <label class="form-label">Codigo de Equipo</label>
                                    <input type="text" class="form-control" id="codigo" placeholder="E001">
                                    <small id="errorCodigo" class="text-danger"></small>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Nombre del Equipo</label>
                                    <input type="text" class="form-control" id="nombre">
                                    <small id="errorNombre" class="text-danger"></small>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Tipo</label>
                                    <select class="form-select" id="tipo">
                                        <option value="">Seleccione</option>
                                        <option>Laptops</option>
                                        <option>Redes</option>
                                        <option>Servidores</option>
                                    </select>
                                    <small id="errorTipo" class="text-danger"></small>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Precio Unitario</label>
                                    <input type="number" class="form-control" id="precio">
                                    <small id="errorPrecio" class="text-danger"></small>
                                </div>
                                <button type="submit" class="btn">Registrar Equipo</button>
                            </form>
                        </div>

                    </div>
                </div>
            </section>

            <section class="derecha">
                <div class="col-md-9">
                    <div class="card shadow">
                        <div class="card-header d-flex justifify-content-between">
                            <h4>Equipos Registrados</h4>
                            <span class="badge bg-primary fs-6" id="contador">
                                0
                            </span>
                        </div>
                        <div class="card-body">
                            <table class="table table-bordered table-striped">
                                <thead class="table-dark">
                                    <tr>
                                        <th>Codigo</th>
                                        <th>Nombre</th>
                                        <th>Tipo</th>
                                        <th>Precio</th>
                                    </tr>
                                </thead>
                                <tbody id="tablaEquipo"></tbody>
                            </table>
                            <button class="btn btn-danger" id="limpiarTabla">Limpiar Tabla</button>
                        </div>
                    </div>
                </div>
            </section>
        </section>
    </div>
    <script src="script.js"></script>
</body>

</html>
